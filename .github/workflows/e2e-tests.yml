name: End-to-End Tests

on:
  pull_request:
    branches: [dev]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    environment: qa

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rollingstory
          POSTGRES_PASSWORD: rollingstory_password
          POSTGRES_DB: rollingstory_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Create .env.test file
        run: |
          cat > .env.test << EOF
          NODE_ENV="qa"
          FRONTEND_URL="https://rollingstory-web-qa.vercel.app"
          DATABASE_URL="${{ secrets.DATABASE_URL }}"
          JWT_SECRET="${{ secrets.JWT_SECRET }}"
          REDIS_URL="${{ secrets.REDIS_URL }}"
          RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          EOF

      - name: Run Prisma migrations
        run: npx dotenv -e .env.test -- npx prisma migrate deploy

      - name: Run E2E tests
        run: yarn test:e2e
